<body>

<header class="main-header">

    <div class="h-left">

    <div class="h-right">

<main class="main-container">

    <aside class="left-sidebar">

        <nav class="side-nav">

            <a class="active"><i class="fa-solid fa-house"></i> Home</a>

            <a><i class="fa-solid fa-shirt"></i> Outfit</a>

            <a><i class="fa-solid fa-users"></i> Community</a>

        </nav>

    </aside>


    <section class="feed">

        <div class="create-post">

            <div class="cp-avatar"></div>

            <input placeholder="Condividi il tuo stile oggi...">

            <button class="icon-btn">
                <i class="fa-solid fa-image"></i>

        <article class="post-card">

                <div class="user-info">

                    <div class="user-avatar"></div>

                        <p class="uname">MarcoRossi_99</p>

                        <span class="ts">2 ore fa</span>

                </div>

                <button class="opts-btn">
                    <i class="fa-solid fa-ellipsis"></i>
                </button>

            </div>

            <div class="post-actions">

                    </button>

                    <button class="act-btn">

                    </button>

                    <button class="act-btn">

                    </button>

                </div>

                <button class="save-btn">

            </div>

                <p class="likes">Piace a 1,234 persone</p>

                <p class="caption">

                    <span class="uname">MarcoRossi_99</span>

                <p class="view-c">Visualizza tutti i 45 commenti</p>
